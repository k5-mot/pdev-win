schema: spec-driven

context: |
  Project: pdev-win, a Windows PowerShell portable development environment bootstrap.
  Documentation boundary:
    - OpenSpec is the source of truth for development requirements, implementation contracts, contribution rules, and maintainer workflow requirements.
    - README, docs/, and script README files are for user-facing manuals, troubleshooting, and operational instructions.
    - Do not duplicate OpenSpec requirements as standalone docs under docs/.
  Commit convention: Japanese gitmoji Conventional Commits in the form "<gitmoji> <type>: <summary>".

